name: Willhaben Watcher

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PYTHONUNBUFFERED: "1" # Forces Python to print immediately
        run: python -u willhaben_bot.py

      - name: Commit state
        run: |
          git config --global user.name 'WillhabenBot'
          git config --global user.email 'bot@github.com'
          
          # Only proceed if seen_ids.txt was actually modified
          if git diff --quiet seen_ids.txt; then
            echo "No changes in seen_ids.txt. Skipping commit."
            exit 0
          fi

          git add seen_ids.txt
          git stash
          git pull --rebase origin main
          git stash pop || echo "Nothing to pop"
          git add seen_ids.txt
          git commit -m "Update seen items [skip ci]" || exit 0
          git push origin main
