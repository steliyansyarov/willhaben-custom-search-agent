name: Willhaben Watcher

on:
  schedule:
    - cron: '*/20 * * * *' # Every 20 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PYTHONUNBUFFERED: "1" # Forces Python to print immediately
        run: python willhaben_bot.py

      - name: Commit state
        run: |
          git config --global user.name 'WillhabenBot'
          git config --global user.email 'bot@github.com'
          # 1. Stash the changes made by the Python script (seen_ids.txt)
          git stash
          # 2. Pull the latest state from the main branch
          git pull --rebase origin main
          # 3. Pop the changes back (re-applying the new IDs)
          git stash pop || echo "No stash to apply"
          # 4. Finalize the commit and push
          git add seen_ids.txt
          git commit -m "Update seen items" || exit 0
          git push origin main